# ─────────────────────────────────────────────────────────────────────────────
# Dev Team Agent Profiles — All 12 agents
# Follows the same _schema.yaml as roofing agents, with dev-specific fields
# No Google Workspace email needed — Slack + API only
# ─────────────────────────────────────────────────────────────────────────────

# These profiles differ from roofing agents:
# - No google_workspace (no GW email accounts)
# - No Kasm desktop for cron-only agents
# - Service tokens scoped to dev operations, not accounting
# - Private Slack channels only (Chris + Dev Conductor)
# ─────────────────────────────────────────────────────────────────────────────

dev_team_profiles:

  dev_conductor:
    identity:
      id: "dev-conductor"
      display_name: "Dev Conductor"
      role: "dev-team-coordinator"
      persona_description: "Chris's single point of contact for all dev team work. Receives all requests from Chris, routes to specialized agents, translates results into plain business language, and owns the weekly dev digest."
    platform:
      client_id: "pro-exteriors"
      workspace_domain: "cc.proexteriorsus.net"
      agent_host: "5.78.146.161"
      command_center_url: "https://cc.proexteriorsus.net"
      kasm_base_url: "https://desktops.proexteriorsus.net"
    kasm:
      desktop_enabled: true
      desktop_name: "pe-dev-conductor"
      kasm_username: "dev-conductor@cc.proexteriorsus.net"  # virtual — no GW account, uses SA
      image_id: "2c589484-3521-41fc-bec6-ac785ae87dd7"
      network_policy: "standard"
    slack:
      bot_display_name: "Dev Conductor"
      app_name: "Dev Conductor"
      team_id: "T0B8QEGPVQW"
      channels:
        - name: "ob-dev-command"
          purpose: "Private — Chris + Dev Conductor only. All dev requests and results."
        - name: "ob-dev-team"
          purpose: "Internal dev team. Conductor routes tasks here."
        - name: "ob-dev-incidents"
          purpose: "P0/P1 incidents. Pages Chris immediately."
        - name: "ob-dev-weekly"
          purpose: "Weekly digest to Chris."
      bot_scopes: [chat:write, channels:read, channels:history, channels:join, groups:write, groups:read, files:read, app_mentions:read]
      socket_mode_enabled: true
    hermes:
      model: "anthropic/claude-sonnet-4-20250514"
      provider: "openrouter"
      tier: "workhorse"
      toolsets: [web, file, terminal]
      skills: [nepq-agent-communication, deploy-agent, agent-profile-builder]
      cadence: "always-on"
    guardrails:
      no_external_send: true
      no_approval_decide: true
      no_supabase_service_role: true
      no_public_internet: false
      escalation_triggers:
        - "P0/P1 incident detected — page Chris immediately"
        - "Security Guardian finds CRITICAL vulnerability"
        - "Red Team validation fails a guardrail — stop all agent ops"
        - "Any agent goes offline unexpectedly during business hours"
        - "Chris's request cannot be fulfilled within stated SLA"

