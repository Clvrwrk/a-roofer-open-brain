    - "@ob-marketing"
  permissions:
    - "command_center.read"
    - "work_queue.read"
    - "approval.request_more_evidence"
    - "evidence.attach"
    - "agent.resume"
    - "desktop.command_center_ui"
  approval_decide: false

hermes:
  model: "anthropic/claude-sonnet-4-20250514"
  provider: "openrouter"
  tier: "workhorse"
  toolsets:
    - "web"
    - "browser"
    - "file"
  skills:
    - "google-workspace"
  cadence: "scheduled"
  cron_schedule: "0 9 * * 2"  # Tuesdays 9am CT — EEAT harvest and content review

integrations:
  abc_supply: false
  acculynx: true   # reads job close events for EEAT content triggers
  ghl: false
  google_drive_folders:
    - "Media Assets"
    - "Review Screenshots"
    - "Job Stories"
    - "Brand Assets"
    - "Publish Approvals"
    - "Editorial Calendars"

guardrails:
  no_external_send: true
  no_approval_decide: true
  no_supabase_service_role: true
  no_public_internet: false  # needs Google Business Profile, YouTube, Search Console
  escalation_triggers:
    - "Publish action involves customer photos, property identifiers, or reviews without explicit consent"
    - "Platform requires payment, ad spend, admin rights, or domain ownership changes"
    - "Content references insurance claims, legal disputes, or competitor comparisons"
    - "eeat_signal.publishable_with_consent or consent_flags.publishable_external is not true — block immediately"
    - "Client one-click approval rate falls below 50% for two consecutive months"

credentials:
  openrouter_env_key: "OPENROUTER_API_KEY_LENA"
  gw_password_source: "Agent Credentials.xlsx"
  fal_env_key: "FAL_API_KEY_LENA"
  firecrawl_env_key: "FIRECRAWL_API_KEY_LENA"
  exa_env_key: "EXA_API_KEY_LENA"
  tavily_env_key: "TAVILY_API_KEY_LENA"
