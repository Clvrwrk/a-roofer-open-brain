kasm:
  desktop_enabled: true
  desktop_name: "pe-maya-chen"
  kasm_username: "maya.chen@cc.proexteriorsus.net"
  image_id: "2c589484-3521-41fc-bec6-ac785ae87dd7"
  network_policy: "standard"
  resources:
    ram_gb: 8
    cpu: 2
    disk_gb: 16

slack:
  bot_display_name: "Maya Chen"
  app_name: "Maya Chen (Accounting)"
  app_id: "A0BD0PAEU2E"   # canonical Slack app (installed bot). Duplicates to delete.
  team_id: "T0B8QEGPVQW"
  bot_scopes:
    - "chat:write"
    - "channels:read"
    - "channels:history"
    - "channels:join"
    - "files:read"
    - "files:write"
    - "app_mentions:read"
  socket_mode_enabled: true

  listen_policy:
    mode: "all_human_operational_channels"
    respond_when: "in_sop_scope_or_directly_mentioned"
    overlap_resolution: "ops_conductor_decides"
    no_agent_dm: true
    ambient_response_allowed: true
    out_of_domain_behavior: "ignore_or_polite_decline"
    undefined_sop_behavior: "ops_conductor_to_chris_for_instruction_and_sop_improvement"
    unclear_file_escalation: "ops_conductor_linear_ticket"
  channels:
    - name: "accounting-vendor-intake"
      id: "C0BCUF29G1H"
      purpose: "Human-facing operational channel; all named Roofing-Ops agents listen for in-scope requests."
    - name: "accounting-credit-memos"
      id: "C0BD4EW4RU4"
      purpose: "Human-facing operational channel; all named Roofing-Ops agents listen for in-scope requests."
    - name: "accounting-product-catalog-review"
      id: "C0BCYNW98RL"
      purpose: "Human-facing operational channel; all named Roofing-Ops agents listen for in-scope requests."

command_center:
  service_agent_id: "ob-accounting"
  departments:
    - "accounting"
    - "system"
  maps_to:
    - "@ob-accounting"
    - "Capture"
  permissions:
    - "command_center.read"
    - "work_queue.read"
    - "approval.request_more_evidence"
    - "evidence.attach"
    - "agent.resume"
    - "desktop.command_center_ui"
  approval_decide: false

hermes:
  model: "anthropic/claude-sonnet-4-20250514"
  provider: "openrouter"
  tier: "workhorse"
  toolsets:
    - "web"
    - "file"
    - "terminal"
  skills:
    - "open-brain-agent-onboarding"
    - "google-workspace"
    - "credential-handling-patterns"
  cadence: "always-on"
  cron_schedule: null  # always-on: polls Gmail every 60s via persistent loop

integrations:
  abc_supply: true
  acculynx: false  # Maya doesn't need AccuLynx directly
  ghl: false       # GHL intake handled via Gmail aliases, not GHL directly
  agentmail_inbox: "ob-accounting@agentmail.proexteriorsus.net"
  google_drive_folders:
    - "Vendor Invoice Exports"
    - "Price Agreements"
    - "Open Invoice Reports"
    - "Credit Memo Packets"

guardrails:
  no_external_send: true
  no_approval_decide: true
  no_supabase_service_role: true
  no_public_internet: false  # needs browser for vendor portal downloads
  escalation_triggers:
    - "Document is unreadable, malformed, password-protected, or not classifiable"
    - "Supplier portal asks for new permissions, payment details, or MFA re-enrollment"
    - "PDF contains unexpected PII or legal documents outside invoice scope"
    - "hr@ or payroll@ alias receives any document — escalate immediately without extraction"
    - "Attachment is flagged as SPAM by Gmail — surface for human verification before processing"

credentials:
  openrouter_env_key: "OPENROUTER_API_KEY_MAYA"
  gw_password_source: "Agent Credentials.xlsx"
  fal_env_key: "FAL_API_KEY_MAYA"
  firecrawl_env_key: "FIRECRAWL_API_KEY_MAYA"
  exa_env_key: "EXA_API_KEY_MAYA"
  tavily_env_key: "TAVILY_API_KEY_MAYA"
