# ═══════════════════════════════════════════════════════════════════════════════
# LENA BROOKS — EEAT, Reputation & Local Content
# Role: Public-trust builder — before/after photos, reviews, cert badges, local pages
# Best practice sources: TheeDigital, OneClickCode SEO, CIWebGroup, amraandelma stats
# ═══════════════════════════════════════════════════════════════════════════════
lena_brooks:
  event_triggered:
    on_job_closed:
      trigger: "AccuLynx job.closed webhook"
      delay: "72 hours (3-day post-completion)"
      action: |
        1. Pull job data from Historian: scope, neighborhood, crew, photos, homeowner
        2. Check consent_flags.publishable_external for all atoms
        3. Draft review request sequence (NEPQ-informed — not pushy):
           Day 3: Text/email "How's the new roof looking?"
           Day 5: Review request with specific question "What stood out for you?"
           Day 14: Final follow-up if no review
        4. Route through Conductor for human approval before sending
      best_practice: |
        Roofing marketing stats 2026 (amraandelma): "Review request sent within
        3-7 days of job completion has 47% response rate vs 12% at 30+ days.
        Personalized requests outperform generic by 3x."
        Source: amraandelma.com/roofing-marketing-statistics

    on_review_received:
      trigger: "new Google/Yelp review detected by Rowan"
      action: |
        1. Classify: positive / negative / neutral / mixed
        2. Draft response within 24 hours (NEPQ tone: acknowledge → validate → resolve/celebrate)
        3. Positive: "Thank you for trusting us with your home. We're proud of the work
           the team did on [specific detail from review]. We look forward to being your
           go-to roofing team."
        4. Negative: Acknowledge → offer to make right → take offline
        5. Route draft to human for approval
        6. Atomize review as EEAT evidence atom
      best_practice: |
        NEPQ de-escalation principle: "Never argue. Never justify. First validate
        their experience, then offer a path forward. The goal is not to win the
        review argument — it's to demonstrate professionalism to future readers."

  weekly:
    eeat_content_harvest:
      cron: "0 9 * * 2"  # Tuesday 9am CT
      action: |
        1. Pull soft atoms from Historian with eeat_signal.value > 0.7
        2. From completed jobs this week — identify content-worthy moments:
           - Unusual scope or challenge solved
           - Exceptional crew performance noted
           - Homeowner emotional response captured in debrief
        3. Draft 1-2 project stories (300-500 words each)
        4. Include schema.org markup draft (LocalBusiness, Service, Review)
        5. Route to Conductor for one-click approval
      best_practice: |
        Google E-E-A-T (2024): Content must demonstrate Experience, Expertise,
        Authoritativeness, Trustworthiness. For roofing: job-specific details
        (address neighborhood, specific product, before/after) are non-negotiable
        for EEAT signals. Generic content ranks poorly.
        Source: ciwebgroup.com/blog/seo-for-roofers, theedigital.com/blog/seo-for-roofing-company

    photo_curation:
      cron: "0 10 * * 2"
      action: |
        1. Pull CompanyCam photos from jobs completed this week
        2. Select 3-5 best photos per job: damage evidence, mid-work, finished
        3. Check consent_flags for each photo (no consent = quarantine)
        4. Flag photos with neighbor's property / personal items for consent review
        5. Tag selected photos with job metadata for content library

    reputation_monitoring:
      cron: "0 8 * * 5"
      action: |
        1. Check Google Business Profile for new reviews
        2. Check Yelp, BBB, Angi, HomeAdvisor for new reviews
        3. Check Google Maps ranking for target keywords in Austin/Round Rock
        4. Post weekly rep summary to #accounting-product-catalog-review (shared channel)

  monthly:
    seo_content_calendar:
      cron: "0 9 5 * *"
      action: |
        1. Plan next month's content: 4 project stories, 1 neighborhood page, 1 FAQ
        2. Target keywords from Rowan's research (Ahrefs/SEMrush data)
        3. Map content to neighborhoods where jobs completed (service area expansion)
        4. Submit calendar to Conductor for human review

    review_velocity_report:
      cron: "0 10 5 * *"
      action: |
        1. Review count this month vs last month vs same month prior year
        2. Average star rating trend
        3. Response rate (% of reviews responded to)
        4. Post to #accounting-product-catalog-review

    certification_badge_refresh:
      cron: "0 11 5 * *"
      action: |
        1. Pull certification status from Rowan's monitor
        2. Update website certification badge if renewed/changed
        3. Verify warranty registration count meets GAF/OC tier requirements

  quarterly:
    local_seo_audit:
      cron: "0 9 1 4,7,10,1 *"
      action: |
        1. Map pack ranking for top 20 target keywords
        2. Competitor content analysis (what are they publishing that ranks?)
        3. Schema markup validity check (Auditor handles)
        4. Submit full audit to Dev team for technical SEO fixes
      best_practice: |
        OneClickCode SEO 2024: "For roofing contractors, local SEO wins come from:
        (1) neighborhood-specific landing pages with completed job data,
        (2) before/after photos with geotagged metadata,
        (3) 3.9+ star rating with >50 reviews.
        Source: oneclickcode.com/blog/a-guide-to-local-seo-for-roofing-contractors"

  annual:
    brand_audit:
      cron: "0 9 20 1 *"  # Jan 20
      action: |
        1. Full year content performance: which project stories drove traffic?
        2. Review volume year-over-year
        3. Top ranking keywords and their trajectory
        4. Competitive positioning shift
        5. Submit brand health report to Chris

