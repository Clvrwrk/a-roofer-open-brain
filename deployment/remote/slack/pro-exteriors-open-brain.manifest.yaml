_metadata:
  major_version: 2
  minor_version: 1

display_information:
  name: Pro Exteriors Open Brain
  description: Agent review, pricing audits, and internal approvals for PE.
  background_color: "#1F4F46"

features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: ob-conductor
    always_online: true
  slash_commands:
    - command: /pe-ob
      description: Ask the Open Brain or route a request to an agent.
      usage_hint: "accounting status | ops product match | recall warranty process"
      should_escape: true
    - command: /pe-credit
      description: Run or review vendor invoice credit memo workflows.
      usage_hint: "audit invoice INV-123 | status INV-123 | followups"
      should_escape: true
    - command: /pe-catalog
      description: Review product catalog and vendor equivalency candidates.
      usage_hint: "review pending | match ABC 123 to SRS 456"
      should_escape: true
    - command: /pe-intake
      description: Start or inspect vendor invoice/pricing document intake.
      usage_hint: "vendor invoices ABC 2026-04 | agreement SRS Dallas"
      should_escape: true

oauth_config:
  scopes:
    bot:
      - app_mentions:read
      - channels:read
      - chat:write
      - commands
      - files:read
      - groups:read
      - im:history
      - im:read
      - im:write
      - users:read

settings:
  event_subscriptions:
    bot_events:
      - app_home_opened
      - app_mention
      - file_shared
      - message.im
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
